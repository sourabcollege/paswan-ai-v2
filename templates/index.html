<script>
window.handleKeyPress = function(event){
    if(event.key === "Enter"){ sendMessage(); }
}

window.createNewChat = async function(){
    try{ 
        await fetch("/new_session", {method:"POST"}); 
        loadSessions(); // Reload sidebar
    }catch(e){}
    document.getElementById("chatContent").innerHTML = `
    <div class="welcome-screen" id="welcomeScreen">
        <h1>Hello!<br>I am paswan.ai</h1>
        <p>How can I help you today?</p>
    </div>`;
}

window.deleteChats = async function(){
    try{ await fetch("/clear_memory", {method:"POST"}); }catch(e){}
    document.getElementById("chatContent").innerHTML = `
    <div class="welcome-screen" id="welcomeScreen">
        <h1>Hello!<br>I am paswan.ai</h1>
        <p>How can I help you today?</p>
    </div>`;
}

window.searchChats = function(){
    const input = document.getElementById("chatSearch").value.toLowerCase();
    document.querySelectorAll(".history-item").forEach(item=>{
        const title = item.querySelector(".session-title");
        if(title){
            item.style.display = title.innerText.toLowerCase().includes(input) ? "flex" : "none";
        }
    });
}

/* Agent toggle */
window.agentMode = false;
window.toggleAgent = function(){
    window.agentMode = !window.agentMode;
    const btn = document.getElementById("agentBtn");
    btn.classList.toggle("agent-active", window.agentMode);
    btn.textContent = window.agentMode ? "🤖 Agent Mode: ON" : "🤖 Agent Mode: OFF";
}

/* Memory summary */
window.showMemory = async function(){
    const panel = document.getElementById("memoryPanel");
    panel.classList.toggle("visible");
    if(panel.classList.contains("visible")){
        panel.textContent = "Loading...";
        try{
            const r = await fetch("/memory_summary");
            const d = await r.json();
            panel.textContent = "🧠 Summary:\n" + d.summary;
        }catch(e){ panel.textContent = "Could not load."; }
    }
}
</script>

<script type="module">

// =========================
// INTRO VIDEO
// =========================
window.addEventListener("load", ()=>{
    const splash = document.getElementById("splash-screen");
    const video = window.innerWidth <= 768
        ? document.getElementById("intro-video-mobile")
        : document.getElementById("intro-video-pc");

    video.onended = ()=>{
        splash.style.opacity = "0";
        setTimeout(()=>{ splash.style.display = "none"; }, 1000);
    };
    setTimeout(()=>{
        if(splash.style.display !== "none"){
            splash.style.opacity = "0";
            setTimeout(()=>{ splash.style.display = "none"; }, 1000);
        }

async function loadSessions(){
    try{
        const response = await fetch("/sessions");
        const sessions = await response.json();
        const list = document.getElementById("history-list");
        list.innerHTML = "";

        if(sessions.length === 0){
            list.innerHTML = '<p style="color:#64748b;font-size:13px;padding:10px;">No chats yet. Start a new conversation!</p>';
            return;
        }

        sessions.forEach(s => {
            const div = document.createElement("div");
            div.className = "history-item" + (s.current ? " active" : "");
            div.dataset.sessionId = s.session_id;

            const titleSpan = document.createElement("span");
            titleSpan.className = "session-title";
            titleSpan.innerText = "💬 " + (s.title || "New Chat");

            const delBtn = document.createElement("button");
            delBtn.className = "delete-session-btn";
            delBtn.innerHTML = "🗑";
            delBtn.title = "Delete this chat";
            delBtn.onclick = async (e) => {
                e.stopPropagation();
                if(!confirm("Delete this chat?")) return;
                await fetch(`/sessions/${s.session_id}`, {method: "DELETE"});
                loadSessions();
                if(s.current){
                    document.getElementById("chatContent").innerHTML = `
                    <div class="welcome-screen" id="welcomeScreen">
                        <h1>Hello!<br>I am paswan.ai</h1>
                        <p>How can I help you today?</p>
                    </div>`;
                }
            };

            div.appendChild(titleSpan);
            div.appendChild(delBtn);

            div.onclick = async () => {
                await switchToSession(s.session_id);
            };

            list.appendChild(div);
        });
    }catch(error){ 
        console.log("Load sessions error:", error);
        // Fallback to old history
        loadHistoryFallback();
    }
}

async function switchToSession(sessionId){
    try{
        await fetch("/switch_session", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({session_id: sessionId})
        });
        currentSessionId = sessionId;
        await loadSessionMessages(sessionId);
        loadSessions(); // Refresh to show active
    }catch(e){ console.log(e); }
}

async function loadSessionMessages(sessionId){
    try{
        const resp = await fetch(`/session_history/${sessionId}`);
        const data = await resp.json();
        const chatContent = document.getElementById("chatContent");
        chatContent.innerHTML = "";

        if(data.length === 0){
            chatContent.innerHTML = `
            <div class="welcome-screen" id="welcomeScreen">
                <h1>Hello!<br>I am paswan.ai</h1>
                <p>How can I help you today?</p>
            </div>`;
            return;
        }

        data.forEach(msg => {
            // User message
            const userDiv = document.createElement("div");
            userDiv.className = "message user";
            userDiv.innerHTML = `
                <div class="sender-title">You</div>
                <div class="bubble">${escapeHtml(msg.user_message || "")}</div>
            `;
            chatContent.appendChild(userDiv);

            // AI reply
            const aiDiv = document.createElement("div");
            aiDiv.className = "message ai";
            aiDiv.innerHTML = `
                <div class="sender-title">paswan.ai</div>
                <div class="bubble">${marked.parse(msg.ai_reply || "")}</div>

            MathJax.typesetPromise([chatContent]).catch(()=>{});

// =========================
// SEND MESSAGE
// =========================
window.sendMessage = async function(){
    if(isSending) return;

    const inputField = document.getElementById("userInput");
    const userText = inputField.value.trim();

    if(userText === "" && !uploadedImageBase64) return;

    isSending = true;
    _lastMsg = userText;
    hideWelcomeScreen();
    const chatContent = document.getElementById("chatContent");
    const imageToSend = uploadedImageBase64;
    _lastImg = imageToSend;

    // Agent badge
    let agentBadgeEl = null;
    if(window.agentMode){
        agentBadgeEl = document.createElement("div");
        agentBadgeEl.className = "agent-badge";
        agentBadgeEl.textContent = "🤖 Agent Mode — multi-step reasoning";
        chatContent.appendChild(agentBadgeEl);
    }

    // User message bubble
    const userMsg = document.createElement("div");
    userMsg.className = "message user";
    userMsg.innerHTML = `
    <div class="sender-title">You</div>
    <div class="bubble">
        ${escapeHtml(userText)}
        ${imageToSend ? `<br><img src="${imageToSend}" class="uploaded-img-preview">` : ""}
    </div>`;
    chatContent.appendChild(userMsg);

    inputField.value = "";
    clearImgPreview();
    scrollChatToBottom();

    const bubbleID = "sb_" + Date.now() + "_" + Math.random().toString(36).slice(2);

    const aiMsg = document.createElement("div");
    aiMsg.className = "message ai";
    aiMsg.innerHTML = `
    <div class="sender-title">paswan.ai</div>
    <div class="bubble" id="${bubbleID}">
        <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>`;
    chatContent.appendChild(aiMsg);
    scrollChatToBottom();

    const getBubble = () => document.getElementById(bubbleID);

    // ── Agent mode ──
    if(window.agentMode && !imageToSend){
        try{
            const resp = await fetch("/chat", {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify({
                    message: userText,
                    uid: currentUID || "anonymous",
                    image_data: null,
                    agent: true,
                    stream: false,
                    mode: currentMode,
                    web_search: webSearchEnabled
                })
            });
            const data = await resp.json();
            const bubble = getBubble();
            if(bubble) bubble.innerHTML = marked.parse(data.reply);
            if(agentBadgeEl) agentBadgeEl.remove();
            addVoiceBtn(aiMsg, data.reply);
            addCopyButtons();
            if(window.MathJax && bubble){
                MathJax.typesetPromise([bubble]).catch(e=>console.log(e));
            }
            await saveChatToFirebase(userText, data.reply);
            loadSessions(); // Refresh sidebar
        }catch(e){
            const bubble = getBubble();
            if(bubble) bubble.innerHTML = "❌ Error. Try again.";
        }
        scrollChatToBottom();
        isSending = false;
        return;
    }

    // ── Streaming mode ──
    try{
        const resp = await fetch("/chat", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
                message: userText,
                uid: currentUID || "anonymous",
                image_data: imageToSend || null,
                agent: false,
                stream: true,
                mode: currentMode,
                web_search: webSearchEnabled
            })
        });

        const reader = resp.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let fullReply = "";
        const bubble = getBubble();
        if(bubble) bubble.innerHTML = "";

        while(true){
            const { done, value } = await reader.read();
            if(done) break;

            const lines = decoder.decode(value, {stream: true}).split("\n");
            for(const line of lines){
                if(!line.startsWith("data: ")) continue;
                try{
                    const parsed = JSON.parse(line.slice(6));
                    if(parsed.token){
                        fullReply += parsed.token;
                        const b = getBubble();
                        if(b){
                            b.innerHTML = marked.parse(fullReply);
                            scrollChatToBottom();
                        }
                    }
                    if(parsed.done){
                        const b = getBubble();
                        if(b && window.MathJax){
                            await MathJax.typesetPromise([b]);
                        }
                        addVoiceBtn(aiMsg, fullReply);
                        addCopyButtons();
                        const b2 = getBubble();
                        if(b2) renderEnhancements(b2);
                        addMsgActions(aiMsg, userText, fullReply);
                        await saveChatToFirebase(userText, fullReply);
                        loadSessions(); // Refresh sidebar with new title
                    }
                    if(parsed.error){
                        const b = getBubble();
                        if(b) b.innerHTML = `❌ Error: ${parsed.error}`;
                    }
                }catch(e){}
            }
        }
    }catch(error){
        console.log(error);
        const b = getBubble();
        if(b) b.innerHTML = "❌ Connection Error. Please try again.";
    }

    scrollChatToBottom();
    isSending = false;
};

window.startVoiceInput = function(){
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SpeechRecognition){ alert("Voice input not supported. Try Chrome."); return; }

    const micBtn = document.getElementById("micBtn");

    if(isRecording){
        if(recognition) recognition.stop();
        isRecording = false;
        micBtn.style.color = "#38bdf8";
        micBtn.textContent = "🎤";
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    isRecording = true;
    micBtn.style.color = "#ef4444";
    micBtn.textContent = "🔴";

    recognition.start();

    recognition.onresult = (event)=>{
        document.getElementById("userInput").value =
            event.results[0][0].transcript;
    };

    recognition.onerror = ()=>{
        isRecording = false;
        micBtn.style.color = "#38bdf8";
        micBtn.textContent = "🎤";
    };

    recognition.onend = ()=>{
        isRecording = false;
        micBtn.style.color = "#38bdf8";
        micBtn.textContent = "🎤";
    };
};

// =========================
// VOICE OUTPUT (TTS)
// =========================
function addVoiceBtn(msgEl, text){
    const bubble = msgEl.querySelector(".bubble");
    if(!bubble) return;

    const btn = document.createElement("button");
    btn.className = "voice-btn";
    btn.title = "Listen to reply";
    btn.textContent = "🔊";

    const clean = text.replace(/[#*`_~\[\]()>]/g,"").substring(0, 500);

    btn.onclick = ()=>{
        if(ttsPlaying){
            window.speechSynthesis.cancel();
            ttsPlaying = null;
            document.querySelectorAll(".voice-btn.playing").forEach(b=>{
                b.classList.remove("playing"); b.textContent="🔊";
            });
            if(btn.classList.contains("playing")) return;
        }

        const utter = new SpeechSynthesisUtterance(clean);
        utter.rate = 1.0; utter.pitch = 1.0; utter.lang = "en-US";

        const voices = window.speechSynthesis.getVoices();
        const preferred = voices.find(v=>v.name.includes("Google US English"))
            || voices.find(v=>v.lang==="en-US") || voices[0];
        if(preferred) utter.voice = preferred;

        btn.classList.add("playing"); btn.textContent = "⏹";
        ttsPlaying = utter;

        utter.onend = ()=>{ btn.classList.remove("playing"); btn.textContent="🔊"; ttsPlaying=null; };
        utter.onerror = ()=>{ btn.classList.remove("playing"); btn.textContent="🔊"; ttsPlaying=null; };

        window.speechSynthesis.speak(utter);
    };

    bubble.appendChild(document.createElement("br"));
    bubble.appendChild(btn);
}

function addCopyButtons(){
    document.querySelectorAll("pre").forEach((block)=>{
        if(block.parentElement.classList.contains("code-block")) return;
        const wrapper = document.createElement("div");
        wrapper.className = "code-block";
        const button = document.createElement("button");
        button.className = "copy-btn";
        button.innerText = "Copy";
        button.onclick = function(){
            navigator.clipboard.writeText(block.innerText);
            button.innerText = "Copied!";
            setTimeout(()=>{ button.innerText = "Copy"; }, 2000);
        };
        block.parentNode.insertBefore(wrapper, block);
        wrapper.appendChild(button);
        wrapper.appendChild(block);
    });
}

window.escapeHtml = function(str){
    if(!str) return "";
    return str
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#39;");
}

    if(!content) return;
    try{
        await fetch("/notes", {

            body: JSON.stringify({title, content})
        });
        document.getElementById("noteTitleInput").value = "";
        document.getElementById("noteContentInput").value = "";
        loadNotes();
    }catch(e){ console.log(e); }

async function loadNotes(){
    try{
        const r = await fetch("/notes");
        const notes = await r.json();
        const list = document.getElementById("notesList");
        if(!list) return;
        list.innerHTML = "";
        if(notes.length === 0){
            list.innerHTML = '<p style="color:#64748b;font-size:13px;">No notes yet.</p>';
            return;
        }
        notes.forEach(note => {
            const div = document.createElement("div");
            div.className = "note-item";
            div.innerHTML = `
                <div class="note-title">${escapeHtml(note.title)} ${note.pinned ? "📌" : ""}</div>
                <div class="note-content">${escapeHtml(note.content)}</div>
                <div class="note-actions">

                    <button class="note-btn" onclick="deleteNote(${note.id})" style="color:#ef4444;">🗑 Delete</button>

        });

}
