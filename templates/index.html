<title>paswan.ai</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0f172a;
background-size:cover;
background-position:center;
background-repeat:no-repeat;
color:#fff;
display:flex;
height:100vh;
overflow-y:auto;
position:relative;
transition:0.5s;
}

body::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.7);
z-index:0;
}

.grid-layer{
position:absolute;
inset:0;
background-image:
linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
background-size:40px 40px;
z-index:0;
}

.sidebar{
width:260px;
background:rgba(15,23,42,0.7);
backdrop-filter:blur(20px);
padding:20px;
z-index:1;
display:flex;
flex-direction:column;
justify-content:space-between;
border-right:1px solid rgba(255,255,255,0.1);
overflow-y:auto;
}

.brand-name{
font-size:28px;
font-weight:800;
color:#38bdf8;
margin-bottom:5px;
}

.code-block{
position:relative;
margin-top:12px;
}

.copy-btn{
background:#2563eb;
color:white;
border:none;
padding:6px 12px;
border-radius:8px;
cursor:pointer;
font-size:12px;
transition:0.2s;
white-space:nowrap;
flex-shrink:0;
}

.copy-btn:hover{
background:#1d4ed8;
}

pre{
background:#0f172a;
padding:18px;
border-radius:14px;
overflow-x:auto;
margin-top:10px;
border:1px solid rgba(255,255,255,0.08);
}

code{
font-family:monospace;
color:#38bdf8;
}

.new-chat-btn,
.delete-btn{
width:100%;
padding:12px;
border:none;
border-radius:12px;
cursor:pointer;
margin-top:12px;
font-weight:bold;
}

.new-chat-btn{
background:#2563eb;
color:white;
}

.delete-btn{
background:rgba(239,68,68,0.15);
color:#ef4444;
}

.history-list{
margin-top:20px;
}

.history-item{
padding:10px;
margin-bottom:8px;
border-radius:8px;
background:rgba(255,255,255,0.05);
font-size:14px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
}

.history-item:hover{
background:rgba(255,255,255,0.1);
}

.history-item.active{
background:rgba(56,189,248,0.15);
border:1px solid rgba(56,189,248,0.3);
}

.history-item .session-title{
flex:1;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}

.history-item .delete-session-btn{
background:none;
border:none;
color:#64748b;
cursor:pointer;
font-size:14px;
padding:2px 6px;
border-radius:4px;
margin-left:6px;
}

.history-item .delete-session-btn:hover{
color:#ef4444;
background:rgba(239,68,68,0.1);
}

.history-item .session-menu-wrap{
position:relative;
}

.history-item .session-menu-btn{
background:none;
border:none;
color:#64748b;
cursor:pointer;
font-size:16px;
padding:2px 8px;
border-radius:4px;
margin-left:6px;
line-height:1;
}

.history-item .session-menu-btn:hover{
color:#e2e8f0;
background:rgba(255,255,255,0.1);
}

.session-dropdown{
position:absolute;
right:0;
top:calc(100% + 4px);
background:#1e293b;
border:1px solid rgba(255,255,255,0.1);
border-radius:8px;
min-width:140px;
box-shadow:0 8px 24px rgba(0,0,0,0.4);
z-index:50;
overflow:hidden;
}

.session-dropdown button{
display:flex;
align-items:center;
gap:8px;
width:100%;
background:none;
border:none;
color:#e2e8f0;
padding:10px 14px;
font-size:13px;
text-align:left;
cursor:pointer;
}

.session-dropdown button:hover{
background:rgba(255,255,255,0.08);
}

.session-dropdown button.danger{
color:#ef4444;
}

.share-modal-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
}

.share-modal{
background:#1e293b;
border:1px solid rgba(255,255,255,0.1);
border-radius:12px;
padding:22px;
width:90%;
max-width:420px;
}

.share-modal h3{
margin:0 0 14px;
font-size:16px;
color:#f1f5f9;
}

.share-modal .link-row{
display:flex;
gap:8px;
margin-bottom:14px;
}

.share-modal input{
flex:1;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.15);
border-radius:8px;
color:#e2e8f0;
padding:8px 10px;
font-size:13px;
}

.share-modal .copy-btn{
background:#38bdf8;
border:none;
color:#0f172a;
font-weight:600;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
font-size:13px;
white-space:nowrap;
}

.share-modal .close-btn{
width:100%;
background:rgba(255,255,255,0.08);
border:none;
color:#e2e8f0;
padding:9px;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

.rename-input{
flex:1;
background:rgba(255,255,255,0.08);
border:1px solid rgba(56,189,248,0.4);
border-radius:6px;
color:#e2e8f0;
padding:4px 8px;
font-size:14px;
width:100%;
}

.main-chat-container{
flex:1;
display:flex;
flex-direction:column;
position:relative;
z-index:1;
}

.chat-area{
flex:1;
overflow-y:auto;
padding:30px;
display:flex;
justify-content:center;
}

.chat-content-wrapper{
width:100%;
max-width:800px;
display:flex;
flex-direction:column;
gap:20px;
}

.welcome-screen{
margin-top:15vh;
}

.welcome-screen h1{
font-size:52px;
background:linear-gradient(90deg,#38bdf8,#818cf8,#ec4899);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.welcome-screen p{
margin-top:15px;
font-size:18px;
color:#cbd5e1;
}

.message{
display:flex;
flex-direction:column;
max-width:85%;
animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.message.user{
align-self:flex-end;
margin-left:auto;
}

.message.ai{
align-self:flex-start;
margin-right:auto;
}

.bubble{
padding:14px 18px;
border-radius:18px;
line-height:1.5;
width:fit-content;
max-width:100%;
word-break:break-word;
}

/* FIX: User message preserves line breaks and formatting */
.user .bubble{
background:#2563eb;
white-space:pre-wrap;
}

.ai .bubble{
background:rgba(15,23,42,0.8);
border:1px solid rgba(255,255,255,0.1);
}

.sender-title{
font-size:12px;
margin-bottom:5px;
opacity:0.8;
}

.uploaded-img-preview{
max-width:250px;
border-radius:12px;
margin-top:10px;
}

.input-area-wrapper{
padding:20px;
display:flex;
justify-content:center;
background:linear-gradient(transparent,rgba(15,23,42,0.95));
}

.input-box{
width:100%;
max-width:800px;
display:flex;
align-items:flex-end;
gap:10px;
padding:12px 18px;
border-radius:25px;
background:rgba(15,23,42,0.8);
border:1px solid rgba(255,255,255,0.1);
}

/* FIX: Textarea input style */
.input-box textarea{
flex:1;
background:none;
border:none;
outline:none;
color:white;
font-size:16px;
resize:none;
font-family:'Segoe UI',sans-serif;
min-height:24px;
max-height:200px;
overflow-y:auto;
line-height:1.5;
padding:4px 0;
}

.input-box input{
flex:1;
background:none;
border:none;
outline:none;
color:white;
font-size:16px;
}

.send-btn,
.mic-btn,
.upload-btn-label{
border:none;
background:none;
cursor:pointer;
font-size:18px;
color:#38bdf8;
padding:4px;
}

#attachUpload{
display:none;
}

.disclaimer{
font-size:11px;
opacity:0.6;
margin-top:8px;
text-align:center;
}

.mobile-topbar{
display:none;
}

/* TYPING INDICATOR */
.typing-dots{
display:flex;
gap:5px;
padding:4px 0;
}
.typing-dots span{
width:8px;height:8px;
border-radius:50%;
background:#38bdf8;
opacity:0.4;
animation:dot 1.4s ease infinite;
}
.typing-dots span:nth-child(2){animation-delay:0.2s;}
.typing-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes dot{
0%,80%,100%{opacity:0.4;transform:scale(1);}
40%{opacity:1;transform:scale(1.3);}
}

/* Voice button */
.voice-btn{
background:none;border:none;cursor:pointer;
color:#818cf8;font-size:15px;
margin-left:8px;opacity:0.75;
transition:0.2s;vertical-align:middle;
}
.voice-btn:hover{opacity:1;transform:scale(1.15);}
.voice-btn.playing{color:#ec4899;animation:vPulse 1s infinite;}
@keyframes vPulse{0%,100%{opacity:0.7;}50%{opacity:1;}}

/* WORKING / PROGRESS INDICATOR — live status during multi-step work
   (e.g. big-file chunked review), Codex-style "still working..." feel */
.working-indicator{
display:flex;align-items:center;gap:10px;
padding:4px 0;
}
.working-spinner{
width:14px;height:14px;border-radius:50%;
border:2px solid rgba(56,189,248,0.25);
border-top-color:#38bdf8;
animation:workingSpin 0.8s linear infinite;
flex-shrink:0;
}
@keyframes workingSpin{to{transform:rotate(360deg);}}
.working-text{
font-size:13.5px;color:#94a3b8;
}

/* CLARIFYING QUESTION CARD — AI asks before guessing, Claude-style */
.clarify-card{
display:flex;flex-direction:column;gap:10px;
min-width:240px;max-width:420px;
}
.clarify-question{
font-size:14.5px;font-weight:600;color:#e2e8f0;
}
.clarify-options{
display:flex;flex-direction:column;gap:6px;
}
.clarify-option{
display:flex;align-items:center;gap:10px;
padding:9px 12px;border-radius:10px;
background:rgba(56,189,248,0.08);
border:1px solid rgba(56,189,248,0.25);
color:#e2e8f0;font-size:13.5px;text-align:left;
cursor:pointer;transition:0.15s;
}
.clarify-option:hover:not(:disabled){
background:rgba(56,189,248,0.18);
border-color:rgba(56,189,248,0.5);
}
.clarify-option:disabled{opacity:0.45;cursor:default;}
.clarify-num{
width:20px;height:20px;border-radius:50%;
background:rgba(56,189,248,0.25);
display:flex;align-items:center;justify-content:center;
font-size:11px;font-weight:bold;flex-shrink:0;
}
.clarify-other-row{
display:flex;gap:6px;margin-top:2px;
}
.clarify-other-input{
flex:1;background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.15);
border-radius:8px;padding:7px 10px;
color:white;font-size:13px;outline:none;
}
.clarify-other-input:focus{border-color:rgba(56,189,248,0.5);}
.clarify-other-input:disabled{opacity:0.45;}
.clarify-other-btn{
background:#38bdf8;border:none;border-radius:8px;
padding:7px 14px;color:#0f172a;font-weight:600;
font-size:13px;cursor:pointer;
}
.clarify-other-btn:hover:not(:disabled){background:#0ea5e9;}
.clarify-other-btn:disabled{opacity:0.45;cursor:default;}
.clarify-skip-row{text-align:right;}
.clarify-skip-btn{
background:none;border:none;color:#94a3b8;
font-size:12px;cursor:pointer;text-decoration:underline;
padding:4px 2px;
}
.clarify-skip-btn:disabled{opacity:0.45;cursor:default;}

/* Agent badge */
.agent-badge{
display:inline-block;
background:rgba(129,140,248,0.15);
color:#818cf8;border:1px solid rgba(129,140,248,0.3);
padding:3px 10px;border-radius:20px;font-size:11px;font-weight:bold;
margin-bottom:6px;
}

/* Memory panel */
.memory-panel{
background:rgba(129,140,248,0.08);
border:1px solid rgba(129,140,248,0.2);
border-radius:10px;padding:12px;
margin-top:10px;font-size:12px;
color:#a5b4fc;display:none;white-space:pre-wrap;
}
.memory-panel.visible{display:block;}

/* img thumb in input */
.img-thumb{
max-height:38px;border-radius:7px;
border:1px solid rgba(255,255,255,0.15);
}

/* Agent toggle active */
.new-chat-btn.agent-active{
background:rgba(129,140,248,0.25);
border:1px solid #818cf8;
color:#818cf8;
box-shadow:0 0 10px rgba(129,140,248,0.25);
}

@media screen and (max-width:768px){

body{overflow:hidden;}

.mobile-topbar{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px;
background:#0f172a;
position:fixed;
top:0;left:0;
width:100%;z-index:1000;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.menu-btn{
font-size:24px;cursor:pointer;color:#38bdf8;
}

.sidebar{
position:fixed;
top:0;left:-280px;
width:260px;height:100vh;
z-index:9999;
transition:0.4s;
background:#0f172a;
overflow-y:auto;
padding-bottom:100px;
}

.sidebar.active{left:0;}

/* FIX: Mobile input always visible */
.main-chat-container{
width:100%;
height:100dvh;
padding-top:60px;
display:flex;
flex-direction:column;
}

.chat-area{
padding:15px;
flex:1;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
padding-bottom:10px;
}

.chat-content-wrapper{max-width:100%;}
.welcome-screen{margin-top:8vh;}
.welcome-screen h1{font-size:34px;}
.welcome-screen p{font-size:16px;}

/* FIX: Input box fixed at bottom */
.input-area-wrapper{
padding:10px;
padding-bottom:env(safe-area-inset-bottom, 10px);
background:rgba(15,23,42,0.98);
position:sticky;
bottom:0;
width:100%;
z-index:100;
}

.input-box{padding:10px;border-radius:18px;}
.input-box textarea{font-size:15px;}
.input-box input{font-size:15px;}
.message{max-width:95%;}
.bubble{font-size:15px;}
.uploaded-img-preview{max-width:180px;}
}

/* Mode selector */
.mode-bar{
display:flex;gap:6px;flex-wrap:wrap;
margin-bottom:8px;
}
.mode-chip{
padding:5px 12px;border-radius:20px;
font-size:12px;font-weight:600;cursor:pointer;
border:1px solid rgba(255,255,255,0.15);
background:rgba(255,255,255,0.05);
color:#94a3b8;transition:all 0.2s;
}
.mode-chip:hover{border-color:#38bdf8;color:#38bdf8;}
.mode-chip.active{background:#2563eb;color:white;border-color:#2563eb;}

/* Web search toggle */
.search-toggle{
display:flex;align-items:center;gap:6px;
font-size:12px;color:#64748b;
cursor:pointer;padding:4px 8px;
border-radius:8px;border:1px solid transparent;
transition:0.2s;
}
.search-toggle.on{color:#38bdf8;border-color:rgba(56,189,248,0.3);}
.search-toggle input{accent-color:#38bdf8;}

/* Message actions */
.msg-actions{
display:flex;gap:6px;margin-top:6px;opacity:0;
transition:opacity 0.2s;
}
.message:hover .msg-actions{opacity:1;}
.msg-action-btn{
background:none;border:none;cursor:pointer;
font-size:13px;color:#64748b;padding:3px 7px;
border-radius:6px;transition:0.2s;
}
.msg-action-btn:hover{background:rgba(255,255,255,0.08);color:#38bdf8;}

/* Retry button */
.retry-btn{
background:none;border:1px solid rgba(239,68,68,0.4);
cursor:pointer;color:#ef4444;font-size:12px;
margin-left:6px;padding:3px 10px;border-radius:8px;
transition:0.2s;
}
.retry-btn:hover{background:rgba(239,68,68,0.15);}

/* Notes panel */
.notes-panel{
position:fixed;right:-380px;top:0;
width:360px;height:100vh;
background:#0f172a;
border-left:1px solid rgba(255,255,255,0.1);
z-index:9998;transition:right 0.3s;
display:flex;flex-direction:column;
padding:20px;
}
.notes-panel.open{right:0;}
.notes-panel h3{color:#38bdf8;margin-bottom:15px;}
.note-input{
width:100%;padding:10px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:10px;color:white;
font-size:14px;resize:vertical;
margin-bottom:8px;min-height:80px;
}
.note-item{
padding:10px;margin-bottom:8px;
background:rgba(255,255,255,0.05);
border-radius:8px;font-size:13px;
border:1px solid rgba(255,255,255,0.08);
position:relative;
}
.note-item .note-title{font-weight:600;color:#38bdf8;margin-bottom:4px;}
.note-item .note-content{color:#cbd5e1;font-size:12px;}
.note-actions{display:flex;gap:6px;margin-top:6px;}
.note-btn{
background:none;border:none;cursor:pointer;
font-size:12px;color:#64748b;padding:2px 6px;
border-radius:4px;
}
.note-btn:hover{color:#38bdf8;}
.notes-list{flex:1;overflow-y:auto;}
.close-panel-btn{
background:none;border:none;color:#64748b;
cursor:pointer;font-size:20px;float:right;
}

/* Voice button */
.voice-btn{
background:none;border:none;cursor:pointer;
color:#818cf8;font-size:15px;
margin-left:8px;opacity:0.75;
transition:0.2s;vertical-align:middle;
}
.voice-btn:hover{opacity:1;transform:scale(1.15);}
.voice-btn.playing{color:#ec4899;animation:vPulse 1s infinite;}
@keyframes vPulse{0%,100%{opacity:0.7;}50%{opacity:1;}}

/* Bookmark indicator */
.bookmarked-badge{
font-size:10px;color:#f59e0b;margin-left:6px;
}

/* SPLASH */
#splash-screen{
position:fixed;top:0;left:0;
width:100%;height:100%;
background:black;z-index:999999;
display:flex;justify-content:center;align-items:center;
overflow:hidden;transition:1s ease;
}

#intro-video-pc{
width:100%;height:100%;object-fit:cover;display:block;
}

#intro-video-mobile{display:none;}

@media(max-width:768px){
#intro-video-pc{display:none;}
#intro-video-mobile{
display:block;width:100%;height:100%;
object-fit:contain;background:black;
}
}


/* Run button */
.run-btn{
background:#10b981;
color:white;
border:none;
padding:6px 12px;
border-radius:8px;
cursor:pointer;
font-size:12px;
transition:0.2s;
font-family:'Segoe UI',sans-serif;
white-space:nowrap;
flex-shrink:0;
}
.run-btn:hover{background:#059669;}
.run-btn:disabled{opacity:0.5;cursor:not-allowed;}

/* Code execution output */
.code-output{
margin-top:8px;
animation:fadeIn 0.3s ease;
}

// FIX (Critical-1): Sanitize marked.parse output to prevent XSS from malicious AI replies
function safeMarkdown(text) {
    if (!text) return "";
    return DOMPurify.sanitize(marked.parse(text));
}

// FIX (High-6): Helper to format file sizes for upload badges
function formatFileSize(bytes) {
    if (!bytes || bytes === 0) return '';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

async function loadSessions(){
    try{
        const response = await fetch("/sessions");
        const sessions = await response.json();
        const list = document.getElementById("history-list");
        list.innerHTML = "";

        if(sessions.length === 0){
            list.innerHTML = '<p style="color:#64748b;font-size:13px;padding:10px;">No chats yet. Start a new conversation!</p>';
            return;
        }

        sessions.forEach(s => {
            const div = document.createElement("div");
            div.className = "history-item" + (s.current ? " active" : "");
            div.dataset.sessionId = s.session_id;

            const titleSpan = document.createElement("span");
            titleSpan.className = "session-title";
            titleSpan.innerText = "💬 " + (s.title || "New Chat");

            // ⋮ menu wrapper (Rename / Share / Delete)
            const menuWrap = document.createElement("div");
            menuWrap.className = "session-menu-wrap";

            const menuBtn = document.createElement("button");
            menuBtn.className = "session-menu-btn";
            menuBtn.innerHTML = "⋮";
            menuBtn.title = "More options";
            menuBtn.onclick = (e) => {
                e.stopPropagation();
                closeAllSessionMenus();
                openSessionMenu(menuWrap, s);
            };

            menuWrap.appendChild(menuBtn);

            div.appendChild(titleSpan);
            div.appendChild(menuWrap);

            div.onclick = async () => {
                await switchToSession(s.session_id);
            };

            list.appendChild(div);
        });
    }catch(error){ 
        console.log("Load sessions error:", error);
        loadHistoryFallback();
    }
}

// ---- ⋮ session menu (Rename / Share / Delete) ----
function closeAllSessionMenus(){

function openSessionMenu(menuWrap, s){
    const dropdown = document.createElement("div");
    dropdown.className = "session-dropdown";

    menuWrap.appendChild(dropdown);
}

document.addEventListener("click", (e) => {
    if(!e.target.closest(".session-menu-wrap")){
        closeAllSessionMenus();
    }
});

function startRenameSession(s){
    // Swap the title span for an inline input, right in the sidebar
    const item = document.querySelector(`.history-item[data-session-id="${s.session_id}"]`);
    if(!item) return;
    const titleSpan = item.querySelector(".session-title");
    const oldText = s.title || "New Chat";

    const input = document.createElement("input");
    input.type = "text";
    input.className = "rename-input";
    input.value = oldText;
    input.maxLength = 60;

    titleSpan.replaceWith(input);
    input.focus();
    input.select();

    const commit = async () => {
        const newTitle = input.value.trim();
        if(newTitle && newTitle !== oldText){
            await fetch(`/sessions/${s.session_id}/rename`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({title: newTitle})
            });
        }
        loadSessions();
    };

    input.addEventListener("keydown", (e) => {
        e.stopPropagation();
        if(e.key === "Enter"){ input.blur(); }
        if(e.key === "Escape"){ loadSessions(); }
    });
    input.addEventListener("click", (e) => e.stopPropagation());
    input.addEventListener("blur", commit);
}

async function shareSession(sessionId){
    try{
        const resp = await fetch(`/sessions/${sessionId}/share`, {method: "POST"});
        const data = await resp.json();
        if(data.status !== "ok"){
            alert("Could not create share link.");
            return;
        }
        const fullUrl = window.location.origin + data.share_url;
        showShareModal(fullUrl);
    }catch(e){
        console.log(e);
        alert("Could not create share link.");
    }
}

function showShareModal(url){
    const overlay = document.createElement("div");
    overlay.className = "share-modal-overlay";
    overlay.onclick = (e) => { if(e.target === overlay) overlay.remove(); };

    overlay.innerHTML = `
        <div class="share-modal">
            <h3>🔗 Anyone with this link can view this chat (read-only)</h3>
            <div class="link-row">
                <input type="text" readonly value="${url}" id="shareLinkInput">
                <button class="copy-btn" id="copyShareLinkBtn">Copy</button>
            </div>
            <button class="close-btn" id="closeShareModalBtn">Close</button>
        </div>
    `;
    document.body.appendChild(overlay);

    const input = overlay.querySelector("#shareLinkInput");
    overlay.querySelector("#copyShareLinkBtn").onclick = async () => {
        try{
            await navigator.clipboard.writeText(url);
        }catch(e){
            input.select();
            document.execCommand("copy");
        }
        const btn = overlay.querySelector("#copyShareLinkBtn");
        btn.innerText = "Copied!";
        setTimeout(()=>{ btn.innerText = "Copy"; }, 1500);
    };
    overlay.querySelector("#closeShareModalBtn").onclick = () => overlay.remove();
}

async function switchToSession(sessionId){

        await fetch("/switch_session", {
            method: "POST",
            headers: {"Content-Type": "application/json"},

        });
        currentSessionId = sessionId;
        await loadSessionMessages(sessionId);

async function loadSessionMessages(sessionId){
    try{
        const resp = await fetch(`/session_history/${sessionId}`);
        const data = await resp.json();
        const chatContent = document.getElementById("chatContent");
        chatContent.innerHTML = "";

        if(data.length === 0){
            chatContent.innerHTML = `
            <div class="welcome-screen" id="welcomeScreen">
                <h1>Hello!<br>I am paswan.ai</h1>
                <p>How can I help you today?</p>
            </div>`;
            return;
        }

        data.forEach(msg => {
            // User message
            const userDiv = document.createElement("div");
            userDiv.className = "message user";
            // FIX: Preserve line breaks + indentation using textContent
            userDiv.innerHTML = `
                <div class="sender-title">You</div>
                <div class="bubble"></div>
            `;
            userDiv.querySelector(".bubble").appendChild(document.createTextNode(msg.user_message || ""));
            chatContent.appendChild(userDiv);

            // AI reply
            const aiDiv = document.createElement("div");
            aiDiv.className = "message ai";
            // FIX (Critical-1): Sanitize stored AI replies before rendering
            aiDiv.innerHTML = `
                <div class="sender-title">paswan.ai</div>
                <div class="bubble">${safeMarkdown(msg.ai_reply || "")}</div>
            `;
            chatContent.appendChild(aiDiv);

            // FIX: Enhance loaded messages (copy buttons, prism, mathjax, voice, actions)
            addCodeBlockButtons();
            const bubble = aiDiv.querySelector(".bubble");
            if(bubble){
                renderEnhancements(bubble);
            }
            addVoiceBtn(aiDiv, msg.ai_reply || "");
            addMsgActions(aiDiv, msg.user_message || "", msg.ai_reply || "");
        });

        scrollChatToBottom();

        if(window.MathJax){
            MathJax.typesetPromise([chatContent]).catch(()=>{});
        }
    }catch(e){ console.log(e); }
}

                    <!-- FIX (Critical-1): Sanitize fallback history replies -->
                    <div class="bubble">${safeMarkdown(chat.reply)}</div>
                </div>`;
                // FIX: Preserve line breaks + indentation using textContent
                const fbBubble = chatContent.querySelector("#fallbackUserBubble");
                if(fbBubble) fbBubble.appendChild(document.createTextNode(chat.message));
                
                // FIX: Enhance fallback loaded messages
                addCodeBlockButtons();
                const aiMsg = chatContent.querySelector(".message.ai");
                const bubble = chatContent.querySelector(".message.ai .bubble");
                if(bubble){
                    renderEnhancements(bubble);

                    addVoiceBtn(aiMsg, chat.reply);
                    addMsgActions(aiMsg, chat.message, chat.reply);
                }

            list.appendChild(div);
        });
    }catch(error){ console.log(error); }

function renderClarifyCard(bubbleEl, clarifyObj){
    bubbleEl.innerHTML = "";
    const card = document.createElement("div");
    card.className = "clarify-card";

    const q = document.createElement("div");
    q.className = "clarify-question";
    q.textContent = clarifyObj.question || "";
    card.appendChild(q);

    const disableAll = () => {
        card.classList.add("clarify-answered");
        card.querySelectorAll("button, input").forEach(el => el.disabled = true);
    };

    const answerWith = (text) => {
        if(!text || !text.trim()) return;
        disableAll();
        const inputField = document.getElementById("userInput");
        inputField.value = text.trim();
        window.sendMessage();
    };

    const optsWrap = document.createElement("div");
    optsWrap.className = "clarify-options";
    (clarifyObj.options || []).forEach((opt, idx) => {
        const btn = document.createElement("button");
        btn.className = "clarify-option";
        btn.type = "button";
        const num = document.createElement("span");
        num.className = "clarify-num";
        num.textContent = String(idx + 1);
        const label = document.createElement("span");
        label.textContent = opt;
        btn.appendChild(num);
        btn.appendChild(label);
        btn.onclick = () => answerWith(opt);
        optsWrap.appendChild(btn);
    });
    card.appendChild(optsWrap);

    const otherRow = document.createElement("div");
    otherRow.className = "clarify-other-row";
    const otherInput = document.createElement("input");
    otherInput.type = "text";
    otherInput.className = "clarify-other-input";
    otherInput.placeholder = "Ya khud likhein...";
    otherInput.onkeydown = (e) => { if(e.key === "Enter") answerWith(otherInput.value); };
    const otherBtn = document.createElement("button");
    otherBtn.type = "button";
    otherBtn.className = "clarify-other-btn";
    otherBtn.textContent = "Send";
    otherBtn.onclick = () => answerWith(otherInput.value);
    otherRow.appendChild(otherInput);
    otherRow.appendChild(otherBtn);
    card.appendChild(otherRow);

    const skipRow = document.createElement("div");
    skipRow.className = "clarify-skip-row";
    const skipBtn = document.createElement("button");
    skipBtn.type = "button";
    skipBtn.className = "clarify-skip-btn";
    skipBtn.textContent = "Skip — apna best judgement use karo";
    skipBtn.onclick = () => answerWith("Koi specific preference nahi hai, aap apne best judgement se decide kar lo.");
    skipRow.appendChild(skipBtn);
    card.appendChild(skipRow);

    bubbleEl.appendChild(card);
}

window.sendMessage = async function(){
    if(isSending) return;

    const inputField = document.getElementById("userInput");
    const userText = inputField.value.trim();

    // FIX (Critical-2): Empty-check must use the live arrays, not the dead singular variables
    if(userText === "" && uploadedImagesBase64.length === 0 && uploadedFilesData.length === 0) return;

    // FIX (High-4): Protect isSending so it always resets even if runChatStream throws
    isSending = true;
    try {
        _lastMsg = userText;
        hideWelcomeScreen();
        const chatContent = document.getElementById("chatContent");
        const imagesToSend = [...(uploadedImagesBase64 || [])];
        const filesToSend = [...(uploadedFilesData || [])];
        _lastImgs = imagesToSend;
        _lastFiles = filesToSend;

        // Agent badge
        let agentBadgeEl = null;
        if(window.agentMode){
            agentBadgeEl = document.createElement("div");
            agentBadgeEl.className = "agent-badge";
            agentBadgeEl.textContent = "🤖 Agent Mode — multi-step reasoning";
            chatContent.appendChild(agentBadgeEl);
        }

        // User message bubble
        const userMsg = document.createElement("div");
        userMsg.className = "message user";
        // FIX: Preserve line breaks + indentation in user messages using textContent
        // (avoids HTML injection risk and reliably keeps whitespace, unlike manual \n->br regex)
        userMsg.innerHTML = `
        <div class="sender-title">You</div>
        <div class="bubble"></div>`;
        const userBubbleEl = userMsg.querySelector(".bubble");
        userBubbleEl.appendChild(document.createTextNode(userText));
        if(filesToSend.length > 0){
            filesToSend.forEach(f => {
                const fileInd = document.createElement("div");
                fileInd.style.cssText = "margin-top:4px;font-size:12px;opacity:0.85;font-weight:500;";
                fileInd.textContent = `📎 ${f.name}`;
                userBubbleEl.appendChild(fileInd);
            });
        }
        if(imagesToSend.length > 0){
            userBubbleEl.appendChild(document.createElement("br"));
            imagesToSend.forEach(img => {
                const imgEl = document.createElement("img");
                imgEl.src = img;
                imgEl.className = "uploaded-img-preview";
                imgEl.style.marginRight = "8px";
                userBubbleEl.appendChild(imgEl);
            });
        }
        chatContent.appendChild(userMsg);

        // FIX: Reset textarea
        inputField.value = "";
        inputField.style.height = "auto";
        clearImgPreview();
        clearFilePreview();
        scrollChatToBottom();

        const bubbleID = "sb_" + Date.now() + "_" + Math.random().toString(36).slice(2);

        const aiMsg = document.createElement("div");
        aiMsg.className = "message ai";
        aiMsg.innerHTML = `
        <div class="sender-title">paswan.ai</div>
        <div class="bubble" id="${bubbleID}">
            <div class="typing-dots"><span></span><span></span><span></span></div>
        </div>`;
        chatContent.appendChild(aiMsg);
        scrollChatToBottom();

        const getBubble = () => document.getElementById(bubbleID);

        // ── Shared SSE streaming handler (Codex-style progress + clarify cards +
        // live token rendering) — used by Agent mode, Auto-Run Code mode, and
        // normal chat alike, so ALL modes get the working indicator and clarify
        // cards, not just the plain default path.
        async function runChatStream(payload, badgeEl){
            try{
                const resp = await fetch("/chat", {
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body: JSON.stringify(Object.assign({}, payload, {stream: true}))
                });

                const reader = resp.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let fullReply = "";
                let clarifyReceived = false;
                const bubble = getBubble();
                if(bubble) bubble.innerHTML = "";

                while(true){
                    const { done, value } = await reader.read();
                    if(done) break;

                    const lines = decoder.decode(value, {stream: true}).split("\n");
                    for(const line of lines){
                        if(!line.startsWith("data: ")) continue;
                        try{
                            const parsed = JSON.parse(line.slice(6));
                            if(parsed.progress){
                                // Codex-style live "working..." status during multi-step
                                // work (e.g. big-file chunked review, agent steps,
                                // auto-run code/fix loop)
                                const b = getBubble();
                                if(b){
                                    setWorkingStatus(b, parsed.progress);
                                    scrollChatToBottom();
                                }
                            }
                            if(parsed.clarify){
                                // AI wants more info before answering — show clickable
                                // question card instead of a plain reply
                                clarifyReceived = true;
                                const b = getBubble();
                                if(b){
                                    renderClarifyCard(b, parsed.clarify);
                                    scrollChatToBottom();
                                }
                            }
                            if(parsed.token){
                                // FIX (High-7): Prevent stream tokens from overwriting a rendered clarify card
                                if (clarifyReceived) continue;
                                fullReply += parsed.token;
                                const b = getBubble();
                                if(b){
                                    // FIX (Critical-1): Sanitize markdown before each DOM update
                                    b.innerHTML = safeMarkdown(fullReply);
                                    scrollChatToBottom();
                                }
                            }
                            if(parsed.done){
                                if(badgeEl) badgeEl.remove();
                                if(clarifyReceived){
                                    // Clarify card is already rendered fully — just
                                    // refresh the sidebar, don't touch the card's DOM.
                                    loadSessions();
                                }else{
                                    const b = getBubble();
                                    if(b && window.MathJax){
                                        await MathJax.typesetPromise([b]);
                                    }
                                    addVoiceBtn(aiMsg, fullReply);
                                    addCodeBlockButtons();
                                    const b2 = getBubble();
                                    if(b2){
                                        renderEnhancements(b2);
                                        addMsgActions(aiMsg, userText, fullReply);
                                    }
                                    await saveChatToFirebase(userText, fullReply);
                                    loadSessions();
                                }
                            }
                            if(parsed.error){
                                const b = getBubble();
                                if(b) b.innerHTML = `❌ Error: ${escapeHtml(parsed.error)}`;
                                if(badgeEl) badgeEl.remove();
                            }
                        }catch(e){}
                    }
                }
            }catch(error){
                console.log(error);
                const b = getBubble();
                if(b) b.innerHTML = "❌ Connection Error. Please try again.";
                if(badgeEl) badgeEl.remove();
            }
        }

        // ── Agent mode ──
        if(window.agentMode && imagesToSend.length === 0){
            await runChatStream({
                message: userText,
                uid: currentUID || "anonymous",
                image_data: null,
                file_data: filesToSend.length > 0 ? {
                    name: filesToSend.map(f => f.name).join(", "),
                    type: filesToSend.map(f => f.type).join(", "),
                    content: filesToSend.map(f => `=== ${f.name} ===\n${f.content}`).join("\n\n")
                } : null,
                agent: true,
                mode: currentMode,
                web_search: webSearchEnabled
            }, agentBadgeEl);
            scrollChatToBottom();
            return;
        }

        // ── Auto-Run Code mode: AI likhta hai, khud run karta hai, error par khud fix karta hai ──
        if(autoRunEnabled && imagesToSend.length === 0){
            let runBadgeEl = document.createElement("div");
            runBadgeEl.className = "agent-badge";
            runBadgeEl.textContent = "⚙️ Auto-Run — code likh kar khud test kiya ja raha hai...";
            chatContent.insertBefore(runBadgeEl, aiMsg);
            scrollChatToBottom();
            await runChatStream({
                message: userText,
                uid: currentUID || "anonymous",
                image_data: null,
                file_data: filesToSend.length > 0 ? {
                    name: filesToSend.map(f => f.name).join(", "),
                    type: filesToSend.map(f => f.type).join(", "),
                    content: filesToSend.map(f => `=== ${f.name} ===\n${f.content}`).join("\n\n")
                } : null,
                agent: false,
                auto_execute: true,
                mode: currentMode,
                web_search: webSearchEnabled
            }, runBadgeEl);
            scrollChatToBottom();
            return;
        }

        // ── Normal streaming chat mode ──
        await runChatStream({
            message: userText,
            uid: currentUID || "anonymous",
            image_data: imagesToSend[0] || null,
            file_data: filesToSend.length > 0 ? {
                name: filesToSend.map(f => f.name).join(", "),
                type: filesToSend.map(f => f.type).join(", "),
                content: filesToSend.map(f => `=== ${f.name} ===\n${f.content}`).join("\n\n")
            } : null,
            agent: false,
            mode: currentMode,
            web_search: webSearchEnabled
        }, null);

        scrollChatToBottom();
    } finally {
        isSending = false;
    }
};

// =========================
// KIMI-STYLE: LARGE PASTE → AUTO FILE
// Jab user 100+ lines ya 3000+ chars paste kare, auto-file ban jaye
// =========================
function handleLargePaste(e) {
    const text = e.clipboardData.getData('text/plain');
    if (!text) return;

    const lineCount = text.split('\n').length;
    const charCount = text.length;

    // Threshold: 100+ lines OR 3000+ chars
    if (lineCount >= 100 || charCount >= 3000) {
        e.preventDefault();

        // Smart filename (first line se)
        let firstLine = text.split('\n')[0].trim().substring(0, 40);
        let safeName = firstLine.replace(/[^a-zA-Z0-9_\-]/g, '_').replace(/_+/g, '_').substring(0, 25);
        if (!safeName) safeName = 'pasted_text';
        const filename = `${safeName}.txt`;

        // Size calculate karo (Kimi jaisa "TXT 73.99 KB" dikhane ke liye)
        const sizeBytes = new Blob([text]).size;
        const sizeStr = sizeBytes > 1024 
            ? (sizeBytes / 1024).toFixed(2) + ' KB' 
            : sizeBytes + ' B';

        uploadedFilesData.push({
            name: filename,
            type: 'TXT',
            content: text,
            size: sizeStr,
            isVirtual: true
        });

        renderFileThumbs();

        // Textarea clear karo kyunki text ab file ban gaya
        const inputField = document.getElementById("userInput");
        if (inputField) {
            inputField.value = "";
            inputField.style.height = "auto";
        }

        showToast(`📄 ${filename} (${sizeStr}) — ${lineCount} lines auto-attached!`);
    }
}

window.startVoiceInput = function(){
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SpeechRecognition){ alert("Voice input not supported. Try Chrome."); return; }

    const micBtn = document.getElementById("micBtn");

    if(isRecording){
        if(recognition) recognition.stop();
        isRecording = false;
        micBtn.style.color = "#38bdf8";
        micBtn.textContent = "🎤";
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    isRecording = true;
    micBtn.style.color = "#ef4444";
    micBtn.textContent = "🔴";

    recognition.start();

    recognition.onresult = (event)=>{
        document.getElementById("userInput").value =
            event.results[0][0].transcript;
    };

    recognition.onerror = ()=>{
        isRecording = false;
        micBtn.style.color = "#38bdf8";
        micBtn.textContent = "🎤";
    };

    recognition.onend = ()=>{
        isRecording = false;
        micBtn.style.color = "#38bdf8";
        micBtn.textContent = "🎤";
    };
};

function addVoiceBtn(msgEl, text){
    const bubble = msgEl.querySelector(".bubble");
    if(!bubble) return;

    const btn = document.createElement("button");
    btn.className = "voice-btn";
    btn.title = "Listen to reply";
    btn.textContent = "🔊";

    const clean = text.replace(/[#*`_~\[\]()>]/g,"").substring(0, 500);

    btn.onclick = ()=>{
        if(ttsPlaying){
            window.speechSynthesis.cancel();
            ttsPlaying = null;
            document.querySelectorAll(".voice-btn.playing").forEach(b=>{
                b.classList.remove("playing"); b.textContent="🔊";
            });
            if(btn.classList.contains("playing")) return;
        }

        const utter = new SpeechSynthesisUtterance(clean);
        utter.rate = 1.0; utter.pitch = 1.0; utter.lang = "en-US";

        const voices = window.speechSynthesis.getVoices();
        const preferred = voices.find(v=>v.name.includes("Google US English"))
            || voices.find(v=>v.lang==="en-US") || voices[0];
        if(preferred) utter.voice = preferred;

        btn.classList.add("playing"); btn.textContent = "⏹";
        ttsPlaying = utter;

        utter.onend = ()=>{ btn.classList.remove("playing"); btn.textContent="🔊"; ttsPlaying=null; };
        utter.onerror = ()=>{ btn.classList.remove("playing"); btn.textContent="🔊"; ttsPlaying=null; };

        window.speechSynthesis.speak(utter);
    };

    bubble.appendChild(document.createElement("br"));
    bubble.appendChild(btn);
}

window.handleAttachUpload = function(event){
    const files = Array.from(event.target.files);
    if(files.length === 0) return;

    // Limit to 6 files max
    const filesToProcess = files.slice(0, 6);
    if(files.length > 6){
        showToast("⚠️ Max 6 files allowed. Only first 6 will be uploaded.");
    }

    filesToProcess.forEach(file => {
        const isImage = file.type.startsWith("image/");
        if(isImage){
            handleImageUpload(file);
        }else{
            handleFileUpload(file);
        }
    });
};

async function handleFileUpload(file){
    const wrap = document.getElementById("fileThumbWrap");
    const uploadingId = 'uploading-' + Date.now() + Math.random().toString(36).slice(2);

    const uploadingBadge = document.createElement("span");
    uploadingBadge.className = "file-badge";
    uploadingBadge.id = uploadingId;
    uploadingBadge.title = "Uploading...";
    uploadingBadge.innerHTML = `⏳ ${file.name}`;
    wrap.appendChild(uploadingBadge);

    const formData = new FormData();
    formData.append("file", file);

    try{
        const resp = await fetch("/upload_file", {method: "POST", body: formData});
        const data = await resp.json();

        // Remove uploading badge
        const badge = document.getElementById(uploadingId);
        if(badge) badge.remove();

        if(data.error){
            showToast("❌ " + data.error);
            return;
        }

        // FIX (High-6): Include file size so thumbnail can display it
        const fileData = {
            name: data.filename || file.name,
            type: data.file_type,
            content: data.extracted_text,
            size: formatFileSize(file.size)
        };
        uploadedFilesData.push(fileData);
        renderFileThumbs();
    }catch(e){
        const badge = document.getElementById(uploadingId);
        if(badge) badge.remove();
        showToast("❌ File upload failed: " + file.name);
    }
}

function renderFileThumbs(){
    const wrap = document.getElementById("fileThumbWrap");
    wrap.innerHTML = uploadedFilesData.map((f, idx) => {
        // Kimi-style badge for virtual/pasted files
        if (f.isVirtual) {
            return `<span class="paste-file-badge" onclick="removeFile(${idx})" title="Click to remove">
                <span class="file-icon">📄</span>
                <span class="file-info">
                    <span class="file-name">${f.name}</span>
                    <span class="file-meta">TXT ${f.size || ''}</span>
                </span>
                <span class="remove-icon">✕</span>

}

// COPY BUTTONS
// =========================
// =======================
// UNIVERSAL CLIPBOARD HELPER
// navigator.clipboard sirf secure context (https:// ya localhost) mein kaam
// karta hai. LAN IP (jaise 192.168.x.x) par http:// insecure माना jaata hai,
// isliye wahan purane execCommand("copy") tareeke par fallback karte hain.
// =======================
function copyToClipboard(text, onSuccess, onFail){
    if(navigator.clipboard && window.isSecureContext){
        navigator.clipboard.writeText(text).then(
            () => { if(onSuccess) onSuccess(); },
            () => { fallbackCopy(text, onSuccess, onFail); }
        );
    }else{
        fallbackCopy(text, onSuccess, onFail);
    }
}

function fallbackCopy(text, onSuccess, onFail){
    try{
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        ta.style.top = "0";
        ta.style.left = "0";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        const ok = document.execCommand("copy");
        document.body.removeChild(ta);
        if(ok){ if(onSuccess) onSuccess(); }
        else{ if(onFail) onFail(); else showToast("❌ Copy nahi ho paya. Manually select karke copy karein."); }
    }catch(e){
        if(onFail) onFail(); else showToast("❌ Copy nahi ho paya. Manually select karke copy karein.");
    }
}

function addCodeBlockButtons(){
    document.querySelectorAll("pre").forEach((block)=>{
        if(block.parentElement && block.parentElement.classList.contains("code-block")) return;
        const wrapper = document.createElement("div");
        wrapper.className = "code-block";

        const btnWrap = document.createElement("div");
        btnWrap.style.cssText = "position:absolute;top:10px;right:10px;display:flex;gap:6px;z-index:10;";

        // Copy button
        const copyBtn = document.createElement("button");
        copyBtn.className = "copy-btn";
        copyBtn.innerText = "Copy";
        copyBtn.onclick = function(){
            copyToClipboard(block.innerText, () => {
                copyBtn.innerText = "Copied!";
                setTimeout(()=>{ copyBtn.innerText = "Copy"; }, 2000);
            }, () => {
                copyBtn.innerText = "❌ Failed";
                setTimeout(()=>{ copyBtn.innerText = "Copy"; }, 2000);
            });
        };

        // Run button
        const runBtn = document.createElement("button");
        runBtn.className = "run-btn";
        runBtn.innerText = "▶ Run";
        runBtn.onclick = async function(){
            runBtn.innerText = "⏳...";
            runBtn.disabled = true;

            const code = block.innerText;
            let lang = "python";
            const codeEl = block.querySelector("code");
            if(codeEl){
                const classes = codeEl.className.split(" ");
                for(const cls of classes){
                    if(cls.startsWith("language-")){
                        lang = cls.replace("language-", "");
                        break;
                    }
                }
            }
            const langMap = {
                "python": "python", "javascript": "javascript", "js": "javascript",
                "bash": "bash", "shell": "bash", "sh": "bash",
                "cpp": "cpp", "c": "c", "java": "java",
                "go": "go", "rust": "rust", "typescript": "typescript", "ts": "typescript"
            };
            const pistonLang = langMap[lang] || "python";

            try{
                const resp = await fetch("/run_code", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({code, language: pistonLang})
                });
                const result = await resp.json();

                const oldOutput = wrapper.querySelector(".code-output");
                if(oldOutput) oldOutput.remove();

                const outputDiv = document.createElement("div");
                outputDiv.className = "code-output";
                if(result.error){
                    outputDiv.innerHTML = `<div style="color:#ef4444;font-size:13px;">❌ ${escapeHtml(result.error)}</div>`;
                }else{
                    const outText = result.output || "✅ Executed successfully (no output)";
                    outputDiv.innerHTML = `<pre style="background:#0f172a;padding:12px;border-radius:8px;margin-top:10px;color:#4ade80;font-size:13px;white-space:pre-wrap;word-break:break-word;border:1px solid rgba(74,222,128,0.2);">${escapeHtml(outText)}</pre>`;
                }
                wrapper.appendChild(outputDiv);
            }catch(e){
                showToast("❌ Code execution failed");
            }finally{
                runBtn.innerText = "▶ Run";
                runBtn.disabled = false;
            }
        };

        btnWrap.appendChild(copyBtn);
        btnWrap.appendChild(runBtn);

        block.parentNode.insertBefore(wrapper, block);
        wrapper.appendChild(btnWrap);
        wrapper.appendChild(block);
    });
}

// =========================
// DOWNLOAD AI REPLY AS PDF
// Sends the reply's markdown to the backend, which renders a real, nicely
// formatted PDF (headings/bullets/bold) and streams it back — used for
// resumes, reports, or any long reply the user wants to save as a file.
// =========================
async function downloadReplyAsPdf(reply, btnEl){
    const originalText = btnEl ? btnEl.textContent : "";
    if(btnEl){ btnEl.textContent = "⏳ Banaya ja raha hai..."; btnEl.disabled = true; }
    try{
        // Try to use the first markdown heading / bold line as a title +
        // filename hint (e.g. a resume's name line), fall back to a generic one.
        const firstLine = (reply.split("\n").find(l => l.trim().length > 0) || "paswan.ai Document")
            .replace(/^#+\s*/, "").replace(/\*\*/g, "").trim();
        const filenameBase = (firstLine || "document").slice(0, 60);

        const resp = await fetch("/export_pdf", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                content: reply,
                title: firstLine,
                filename: filenameBase
            })
        });

        if(!resp.ok){
            const err = await resp.json().catch(() => ({}));
            alert(err.error || "❌ PDF banane mein error aaya.");
            return;
        }

        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${filenameBase.replace(/[^A-Za-z0-9_\-]+/g, "_") || "document"}.pdf`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
    }catch(e){
        console.log(e);
        alert("❌ PDF download mein connection error aaya.");
    }finally{
        if(btnEl){ btnEl.textContent = originalText; btnEl.disabled = false; }
    }
}

window.escapeHtml = function(str){
    if(!str) return "";
    return str
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#39;");
}

window.toggleNotes = function(){
    document.getElementById("notesPanel").classList.toggle("open");
    document.getElementById("bookmarksPanel").classList.remove("open");
    loadNotes();
};

    document.getElementById("bookmarksPanel").classList.toggle("open");

window.saveNote = async function(){
    const title = document.getElementById("noteTitleInput").value.trim() || "Untitled";
    const content = document.getElementById("noteContentInput").value.trim();
    if(!content) return;
    try{
        await fetch("/notes", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({title, content})
        });
        document.getElementById("noteTitleInput").value = "";
        document.getElementById("noteContentInput").value = "";
        loadNotes();
    }catch(e){ console.log(e); }
};

async function loadNotes(){
    try{
        const r = await fetch("/notes");
        const notes = await r.json();
        const list = document.getElementById("notesList");
        if(!list) return;
        list.innerHTML = "";
        if(notes.length === 0){
            list.innerHTML = '<p style="color:#64748b;font-size:13px;">No notes yet.</p>';
            return;
        }
        notes.forEach(note => {
            const div = document.createElement("div");
            div.className = "note-item";
            div.innerHTML = `
                <div class="note-title">${escapeHtml(note.title)} ${note.pinned ? "📌" : ""}</div>
                <div class="note-content">${escapeHtml(note.content)}</div>
                <div class="note-actions">
                    <button class="note-btn" onclick="pinNote(${note.id})">📌 Pin</button>
                    <button class="note-btn" onclick="deleteNote(${note.id})" style="color:#ef4444;">🗑 Delete</button>
                </div>`;
            list.appendChild(div);
        });
    }catch(e){ console.log(e); }
}

window.deleteNote = async function(id){
    await fetch(`/notes/${id}`, {method: "DELETE"});
    loadNotes();
};

window.pinNote = async function(id){
    await fetch(`/notes/${id}/pin`, {method: "POST"});
    loadNotes();
};

// =======================
// BOOKMARKS
// =======================
window.bookmarkMessage = async function(msg, reply){
    try{
        await fetch("/bookmarks", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: msg, reply})
        });
        showToast("🔖 Bookmarked!");
    }catch(e){ console.log(e); }
};

async function loadBookmarks(){
    try{
        const r = await fetch("/bookmarks");
        const items = await r.json();
        const list = document.getElementById("bookmarksList");
        if(!list) return;
        list.innerHTML = "";
        if(items.length === 0){
            list.innerHTML = '<p style="color:#64748b;font-size:13px;">No bookmarks yet.</p>';
            return;
        }
        items.forEach(item => {
            const div = document.createElement("div");
            div.className = "note-item";
            div.innerHTML = `
                <div class="note-title">💬 ${escapeHtml(item.message.substring(0,50))}</div>
                <div class="note-content">${escapeHtml(item.reply.substring(0,100))}...</div>
                <div class="note-actions">
                    <button class="note-btn" onclick="deleteBookmark(${item.id})" style="color:#ef4444;">🗑 Remove</button>
                </div>`;
            list.appendChild(div);
        });
    }catch(e){ console.log(e); }
}

window.deleteBookmark = async function(id){
    await fetch(`/bookmarks/${id}`, {method: "DELETE"});
    loadBookmarks();
};

// =======================
// TOAST NOTIFICATION
// =======================
function showToast(msg){
    const toast = document.createElement("div");
    toast.style.cssText = `
        position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
        background:#2563eb;color:white;padding:10px 20px;
        border-radius:10px;font-size:14px;z-index:99999;
        animation:fadeIn 0.3s ease;
    `;
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

function renderEnhancements(bubble){
    if(window.Prism){
        bubble.querySelectorAll("pre code").forEach(block => {
            Prism.highlightElement(block);
        });
    }
    if(window.MathJax){
        setTimeout(() => {
            MathJax.typesetPromise([bubble]).catch(() => {});
        }, 50);
    }
}
